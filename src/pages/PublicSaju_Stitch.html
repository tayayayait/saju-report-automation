<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-width=1.0" name="viewport"/>
<title>Saju AI Lab Landing &amp; Wizard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#e77e23",
          "background-light": "#f8f7f6",
          "background-dark": "#211811",
        },
        fontFamily: {
          "display": ["Inter", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
      },
    },
  }
</script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap px-10 py-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-6">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">Saju AI Lab.</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="hidden md:flex items-center gap-9">
<a class="text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">How it works</a>
<a class="text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Pricing</a>
<a class="text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">About Us</a>
</div>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors">
<span class="truncate">Start Analysis</span>
</button>
</div>
</header>
<main class="flex-1 px-4 py-12 md:px-10 lg:px-40 flex flex-col items-center">
<div class="max-w-[960px] w-full flex flex-col gap-12">
<div class="text-center flex flex-col gap-4">
<h1 class="text-[#1A2B3C] dark:text-slate-100 text-4xl md:text-5xl lg:text-6xl font-black leading-tight tracking-tight">
            당신의 진짜 운명,<br/>AI 명리학으로 해독하다.
        </h1>
<p class="text-slate-600 dark:text-slate-400 text-base md:text-lg max-w-2xl mx-auto">
            데이터 기반의 정교한 AI 사주 분석으로 당신의 삶을 새롭게 설계하세요. 전통 명리학과 최신 AI 기술의 완벽한 결합.
        </p>
</div>
<div class="bg-white dark:bg-slate-900 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-slate-100 dark:border-slate-800 overflow-hidden">
<div class="p-6 md:p-10 flex flex-col gap-8">
<div class="flex flex-col gap-3">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold">Step 1 of 3</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">33%</p>
</div>
<div class="rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
<div class="h-2 rounded-full bg-primary transition-all duration-500" style="width: 33%;"></div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-wider">달력 유형 선택</p>
</div>
<div class="flex flex-col gap-3">
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">달력 유형을 선택해주세요</h2>
<p class="text-slate-600 dark:text-slate-400 text-base">정확한 사주 분석을 위해 태어난 달력 유형을 선택해주세요.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<button class="group flex flex-col gap-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 text-left hover:border-primary focus:border-primary focus:outline-none transition-all hover:shadow-md cursor-pointer">
<div class="text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined !text-3xl">light_mode</span>
</div>
<div class="flex flex-col gap-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight group-hover:text-primary transition-colors">양력 (Solar)</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">일반적으로 사용하는 달력입니다.</p>
</div>
</button>
<button class="group flex flex-col gap-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 text-left hover:border-primary focus:border-primary focus:outline-none transition-all hover:shadow-md cursor-pointer">
<div class="text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined !text-3xl">dark_mode</span>
</div>
<div class="flex flex-col gap-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight group-hover:text-primary transition-colors">음력 (Lunar)</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">전통적으로 사용하는 달력입니다.</p>
</div>
</button>
<button class="group flex flex-col gap-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 text-left hover:border-primary focus:border-primary focus:outline-none transition-all hover:shadow-md cursor-pointer">
<div class="text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined !text-3xl">wb_twilight</span>
</div>
<div class="flex flex-col gap-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight group-hover:text-primary transition-colors">윤달 (Lunar Leap)</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">음력 윤달에 태어나신 분들을 위한 달력입니다.</p>
</div>
</button>
</div>
<div class="pt-4 flex justify-end">
<button class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-6 bg-primary text-white text-base font-bold leading-normal hover:bg-primary/90 transition-colors shadow-sm">
                    다음 단계로
                </button>
</div>
</div>
</div>
</div>
</main>
</div>
</div>
</body></html>
