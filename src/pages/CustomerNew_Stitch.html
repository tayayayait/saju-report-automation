<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Saju Register New Customer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e77e23",
                        "background-light": "#f8f9fa",
                        "background-dark": "#1a2b3c",
                        "text-main": "#1a2b3c",
                        "border-color": "#e2e8f0"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen text-text-main dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 sm:px-8 md:px-12 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col w-full max-w-[1520px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-color dark:border-slate-700 px-4 py-4 mb-8">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-white dark:bg-slate-800 text-text-main dark:text-slate-100 border border-border-color dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-text-main dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight">Register New Customer</h1>
</div>
<div class="flex gap-4">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-6 bg-primary text-white text-sm font-semibold leading-normal tracking-wide shadow-sm hover:bg-primary/90 transition-colors">
<span>Save</span>
</button>
</div>
</header>
<main class="grid grid-cols-1 lg:grid-cols-12 gap-6 px-4 pb-12">
<div class="lg:col-span-7 xl:col-span-8 flex flex-col gap-6">
<div class="bg-white dark:bg-slate-800 rounded-xl border border-border-color dark:border-slate-700 p-6 md:p-8 shadow-sm">
<h2 class="text-text-main dark:text-slate-100 text-xl font-bold leading-tight tracking-tight mb-6 pb-4 border-b border-border-color dark:border-slate-700">Basic &amp; Birth Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Name</p>
<input class="form-input flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-sm font-medium transition-shadow" placeholder="Enter full name" type="text"/>
</label>
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Gender</p>
<div class="relative">
<select class="form-select flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 px-4 text-sm font-medium appearance-none transition-shadow">
<option disabled="" selected="" value="">Select gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Phone</p>
<input class="form-input flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-sm font-medium transition-shadow" placeholder="Enter phone number" type="tel"/>
</label>
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Email</p>
<input class="form-input flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-sm font-medium transition-shadow" placeholder="Enter email address" type="email"/>
</label>
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Birth Date</p>
<input class="form-input flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-sm font-medium transition-shadow" type="date"/>
</label>
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Birth Time</p>
<input class="form-input flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-sm font-medium transition-shadow" type="time"/>
</label>
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Calendar Type</p>
<div class="relative">
<select class="form-select flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 px-4 text-sm font-medium appearance-none transition-shadow">
<option disabled="" selected="" value="">Select calendar type</option>
<option value="solar">Solar</option>
<option value="lunar">Lunar</option>
</select>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-text-main dark:text-slate-200 text-sm font-semibold leading-normal mb-2">Birth Place</p>
<input class="form-input flex w-full rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-sm font-medium transition-shadow" placeholder="City, Country" type="text"/>
</label>
</div>
</div>
</div>
<div class="lg:col-span-5 xl:col-span-4 flex flex-col h-full">
<div class="bg-white dark:bg-slate-800 rounded-xl border border-border-color dark:border-slate-700 p-6 md:p-8 flex flex-col h-full shadow-sm">
<h2 class="text-text-main dark:text-slate-100 text-xl font-bold leading-tight tracking-tight mb-6 pb-4 border-b border-border-color dark:border-slate-700">Consultation Memo</h2>
<label class="flex flex-col flex-1 h-full min-h-[300px]">
<textarea class="form-textarea flex w-full flex-1 rounded-lg text-text-main dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary border border-border-color dark:border-slate-600 bg-white dark:bg-slate-900 p-4 placeholder:text-slate-400 dark:placeholder:text-slate-500 text-sm font-medium resize-none transition-shadow" placeholder="Enter consultation notes, specific requests, or analytical observations here..."></textarea>
</label>
</div>
</div>
</main>
</div>
</div>
</div>
</div>
</body></html>
